<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/images/browser_logo.jpeg" type="image/jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1756AA" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/browser_logo.jpeg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="description" content="DPay - Complete digital platform for mobile & DTH recharge, bill payments, payout, and other financial services." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>DPayment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <style>
        .beta-loader-wrapper {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #ffffff;
          z-index: 999999;
          font-family: 'Inter', sans-serif;
        }

        .loader-logo {
          width: 75px;
          height: 75px;
          border-radius: 18px;
          object-fit: cover;
          animation: logo-pulse 2s infinite ease-in-out;
          position: relative;
          z-index: 10;
          box-shadow: 0 10px 25px rgba(26, 35, 126, 0.15);
        }

        .loader-ring-wrapper {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 140px;
          height: 140px;
        }

        .loader-ring {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 3.5px solid transparent;
          border-top-color: #1A237E;
          border-right-color: #00A651;
          border-bottom-color: #FF8C00;
          border-left-color: #00AAFF;
          animation: spin-smooth 1.5s linear infinite;
        }

        .loader-ripple {
          position: absolute;
          width: 75px;
          height: 75px;
          border-radius: 50%;
          background: rgba(26, 35, 126, 0.08);
          animation: ripple-effect 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-text {
          margin-top: 35px;
          font-size: 1.15rem;
          font-weight: 800;
          color: #1A237E;
          letter-spacing: 2.5px;
          text-transform: uppercase;
          display: flex;
          align-items: center;
        }

        .loader-dots::after {
          content: '';
          display: inline-block;
          width: 24px;
          text-align: left;
          animation: dots 1.5s infinite steps(4, end);
        }

        @keyframes spin-smooth {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        @keyframes logo-pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.06); }
        }

        @keyframes ripple-effect {
          0% { transform: scale(1); opacity: 1; }
          100% { transform: scale(2.8); opacity: 0; }
        }

        @keyframes dots {
          0%, 20% { content: ''; }
          40% { content: '.'; }
          60% { content: '..'; }
          80%, 100% { content: '...'; }
        }
      </style>
      <div class="beta-loader-wrapper">
        <div class="loader-ring-wrapper">
          <div class="loader-ripple"></div>
          <div class="loader-ring"></div>
          <img src="%PUBLIC_URL%/images/browser_logo.jpeg" alt="DPay" class="loader-logo" />
        </div>
        <div class="loader-text">DPay<span class="loader-dots"></span></div>
      </div>
    </div>
  </body>
</html>
